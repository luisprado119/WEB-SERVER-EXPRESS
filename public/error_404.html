<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Página no encontrada | CodeCrypto Academy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0d1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00d4aa, #00b4d8, #0f3460);
    }
    .logo {
      position: fixed; top: 16px; right: 24px;
      font-size: 0.75rem; color: #00d4aa; letter-spacing: 1px; font-weight: 600;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #00d4aa 0%, #0f3460 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .title {
      font-size: 1.6rem;
      color: #c0c8e0;
      margin-bottom: 1rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .desc {
      color: #6a7490;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.75rem 1.8rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4aa, #00b4d8);
      color: #0d1117;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,170,0.4); }
    .btn-secondary {
      background: transparent;
      color: #00d4aa;
      border: 1px solid #00d4aa;
    }
    .btn-secondary:hover { background: #00d4aa15; }

    /* Animación del número */
    @keyframes glitch {
      0%   { text-shadow: 2px 0 #00d4aa, -2px 0 #0f3460; }
      25%  { text-shadow: -2px 0 #00d4aa,  2px 0 #0f3460; }
      50%  { text-shadow: 2px 2px #00b4d8, -2px -2px #0f3460; }
      75%  { text-shadow: -2px 2px #00d4aa,  2px -2px #0f3460; }
      100% { text-shadow: 2px 0 #00d4aa, -2px 0 #0f3460; }
    }
    .error-code { animation: glitch 3s infinite; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="logo">codecrypto.academy</div>

  <div class="container">
    <div class="icon">⚡</div>
    <div class="error-code">404</div>
    <p class="title">NOT FOUND</p>
    <p class="desc">
      La página que buscas no existe o ha sido movida.<br>
      Esto puede ocurrir cuando una ruta no está definida en Express y el manejador <code style="color:#00d4aa">app.get('*')</code> la captura.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Ir al Inicio</a>
      <a href="/guia.html" class="btn btn-secondary">Ver la Guía</a>
    </div>
  </div>
</body>
</html>
